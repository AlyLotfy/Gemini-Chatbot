<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Student Chatbot</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1220;--panel:#0f172a;--border:#1f2937;--text:#e5e7eb;--muted:#94a3b8;--accent:#10b981}
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,Roboto}
    .page{height:100vh;width:100vw;display:grid}
    .center{place-items:center}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px}
    .auth{max-width:520px;width:100%}
    h1{margin:0 0 8px}
    label{display:block;margin:10px 0 6px;color:var(--muted)}
    input,button{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:#0a1324;color:var(--text)}
    input:focus{outline:1px solid var(--accent)}
    button{background:var(--accent);color:#052018;font-weight:600;border:none;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .error{color:#ef4444;margin-top:8px}
    .hide{display:none}
    /* Chat layout */
    .panel{width:100%;height:100%;display:grid;grid-template-rows:auto 1fr auto;gap:16px;padding:24px}
    .muted{color:var(--muted)}
    .chat-wrap{height:100%;display:grid;grid-template-rows:1fr auto auto;gap:12px}
    .chat-log{border:1px solid var(--border);border-radius:12px;background:#0a1324;padding:12px;overflow:auto}
    .bubble{max-width:70%;padding:10px 12px;border-radius:12px;margin:8px 0;white-space:pre-wrap}
    .me{background:#062415;border:1px solid #134e4a;align-self:flex-end;margin-left:auto}
    .bot{background:#0f172a;border:1px solid #1f2937;align-self:flex-start;margin-right:auto}
    .ask{display:grid;grid-template-columns:1fr auto;gap:12px}
  </style>
</head>
<body>
  <!-- Sign-in full page -->
  <main id="authPage" class="page center">
    <section class="card auth">
      <h1>Sign in</h1>
      <p class="muted">Demo sign-in (client side only).</p>
      <label>Email</label>
      <input id="email" type="email" placeholder="name@example.com" autocomplete="username"/>
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
      <div class="row">
        <div>
          <label>Display Name</label>
          <input id="displayName" type="text" placeholder="Student"/>
        </div>
        <div>
          <label>Course (optional)</label>
          <input id="course" type="text" placeholder="Intro to ML"/>
        </div>
      </div>
      <button id="btnSignIn" style="margin-top:12px">Continue</button>
      <div id="authError" class="error"></div>
    </section>
  </main>

  <!-- Chat full page -->
  <main id="chatPage" class="page hide">
    <section class="panel">
      <header>
        <h1>Student Chatbot</h1>
        <div class="muted" id="userBadge">Signed in as —</div>
      </header>

      <div class="chat-wrap">
        <div id="chatLog" class="chat-log" aria-live="polite"></div>

        <div class="ask">
          <input id="question" placeholder="Ask a study question..."/>
          <button id="sendBtn">Ask</button>
        </div>

        <div id="chatError" class="error"></div>
      </div>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
