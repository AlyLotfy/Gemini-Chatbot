<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Student Chatbot</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1220;
      --panel: #0f172a;
      --border: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #10b981;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: Inter, system-ui; background: var(--bg); color: var(--text); }

    /* Centered page container */
    .page { display: flex; justify-content: center; align-items: center; height: 100vh; }

    /* Card layout expanded */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 90%;              /* 🔹 Nearly full width */
      max-width: 1400px;       /* 🔹 Controlled maximum width */
      height: 85vh;
      display: flex;
      flex-direction: column;
    }

    input, button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0a1324;
      color: var(--text);
      margin-top: 8px;
    }

    button {
      background: var(--accent);
      color: #052018;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: #059669; }

    .hide { display: none; }

    /* Chat log area */
    .chat-log {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0a1324;
      padding: 12px;
      flex: 1;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .bubble {
      max-width: 70%;
      padding: 10px 12px;
      border-radius: 12px;
      margin: 8px 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .me {
      background: #062415;
      border: 1px solid #134e4a;
      align-self: flex-end;
      margin-left: auto;
    }

    .bot {
      background: #0f172a;
      border: 1px solid #1f2937;
      align-self: flex-start;
      margin-right: auto;
    }

    .ask {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <!-- Sign-in Page -->
  <main id="authPage" class="page">
    <section class="card" style="max-width:520px; height:auto;">
      <h1>Sign in</h1>
      <p class="muted">Demo sign-in (client side only).</p>
      <label>Email</label>
      <input id="email" type="email" placeholder="name@example.com" autocomplete="username"/>
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
      <label>Display Name</label>
      <input id="displayName" type="text" placeholder="Student"/>
      <label>Course (optional)</label>
      <input id="course" type="text" placeholder="Intro to ML"/>
      <button id="btnSignIn">Continue</button>
      <div id="authError" class="error"></div>
    </section>
  </main>

  <!-- Chat Page -->
  <main id="chatPage" class="page hide">
    <section class="card">
      <h1>Student Chatbot</h1>
      <div id="userBadge" class="muted"></div>
      <div id="chatLog" class="chat-log"></div>
      <div class="ask">
        <input id="question" placeholder="Ask a question..."/>
        <button id="sendBtn">Ask</button>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
